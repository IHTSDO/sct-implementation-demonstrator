<div class="dialog-shell">
  <div class="dialog-header">
    <h2 mat-dialog-title>Result Loader</h2>
    <button mat-icon-button type="button" (click)="close()" aria-label="Close result loader">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content>
    <app-loinc-result-editor
      [result]="data.result"
      [displayText]="data.displayText">
    </app-loinc-result-editor>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="close()">Cancel</button>
    <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="data.result.isGrouper">Apply</button>
  </mat-dialog-actions>
</div>

<h1 mat-dialog-title>ECL Builder</h1>
<div mat-dialog-content class="full-height">
  <app-ecl-builder
    [eclString]="localEcl"
    (eclStringChange)="eclChanged($event)"
    (validityChange)="validityChanged($event)">
  </app-ecl-builder>
</div>
<div mat-dialog-actions class="actions">
  <button mat-button (click)="onNoClick()" cdkFocusInitial>Cancel</button>
  <button mat-flat-button color="accent" [disabled]="!isValid" (click)="confirm()">Ok</button>
</div>

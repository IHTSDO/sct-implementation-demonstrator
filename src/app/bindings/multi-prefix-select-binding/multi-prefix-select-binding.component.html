<mat-form-field appearance="fill" class="multi-prefix-select">
  <mat-label>{{ binding.title || 'Select value' }}</mat-label>

  <mat-select
    [multiple]="isMultiple"
    [ngModel]="isMultiple ? selectedOptions : selectedOption"
    (ngModelChange)="onModelChange($event)"
    [disabled]="isLoading">

    <mat-option>
      <ngx-mat-select-search
        [formControl]="searchCtrl"
        placeholderLabel="Search (multi-prefix, e.g. 'imp nut')"
        noEntriesFoundLabel="No matches found">
      </ngx-mat-select-search>
    </mat-option>

    <mat-option *ngIf="isLoading" disabled>Loading options...</mat-option>

    <mat-option *ngFor="let item of filteredOptions" [value]="item">
      {{ item.display }}
    </mat-option>
  </mat-select>

  <mat-hint *ngIf="selectedCodeHint">{{ selectedCodeHint }}</mat-hint>
  <mat-hint *ngIf="!selectedCodeHint && binding.note">{{ binding.note }}</mat-hint>
</mat-form-field>

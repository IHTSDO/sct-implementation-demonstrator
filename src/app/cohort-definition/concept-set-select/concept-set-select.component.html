<mat-form-field class="concept-set-select">
  <mat-label>{{ label }}</mat-label>
  <mat-select [ngModel]="value" (ngModelChange)="valueChange.emit($event)">
    <mat-option value="">Select a concept set</mat-option>
    @for (conceptSet of conceptSets; track conceptSet.id) {
      <mat-option [value]="conceptSet.id">{{ conceptSet.name }}</mat-option>
    }
  </mat-select>
</mat-form-field>

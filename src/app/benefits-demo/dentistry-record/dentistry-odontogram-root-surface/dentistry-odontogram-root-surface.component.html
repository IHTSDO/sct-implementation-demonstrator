<div class="root-surface-container">
  <div class="root-surface-header">
    <div>
      <h3>Odontogram View</h3>
      <p>Segmented surfaces with larger central polygon for molars.</p>
    </div>
    <div class="root-surface-controls">
      <label class="show-roots-toggle">
        <input
          type="checkbox"
          [checked]="showRoots"
          (change)="onShowRootsChange(!!$any($event.target).checked)">
        <span>Show root surfaces</span>
      </label>

      <div class="notation-toggle" role="group" aria-label="Tooth numbering selector">
        <button
          type="button"
          class="notation-button"
          [class.active]="notationSystem === 'FDI'"
          (click)="onNotationSystemChange('FDI')">
          FDI (ISO)
        </button>
        <button
          type="button"
          class="notation-button"
          [class.active]="notationSystem === 'Universal'"
          (click)="onNotationSystemChange('Universal')">
          Universal
        </button>
      </div>
    </div>
  </div>

  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 1000 560"
    class="root-surface-canvas"
    role="listbox"
    aria-label="Interactive root surface odontogram"
    aria-multiselectable="true"
    (mouseleave)="toothMouseLeave.emit()">
    <line class="cross-line" x1="500" y1="85" x2="500" y2="470"></line>
    <line class="cross-line" x1="120" y1="280" x2="880" y2="280"></line>

    <g class="quadrant-labels">
      <text x="80" y="290">R</text>
      <text x="900" y="290">L</text>
    </g>

    <ng-container *ngFor="let positioned of upperLeftRow; trackBy: trackByToothPosition">
      <g
        class="root-tooth"
        [class.selected]="isSelected(positioned.tooth.id)"
        [class.absent]="isToothAbsent(positioned.tooth.id)"
        [class.without-roots]="!showRoots"
        [attr.transform]="'translate(' + positioned.x + ',' + positioned.y + ') scale(' + getToothScale(positioned.tooth) + ')'"
        [attr.aria-label]="'Tooth ' + getDisplayedNotation(positioned.tooth)"
        [attr.aria-selected]="isSelected(positioned.tooth.id)"
        (mouseenter)="onMouseEnter(positioned.tooth, $event)"
        (mousemove)="toothMouseMove.emit($event)"
        (mouseleave)="toothMouseLeave.emit()">
        <circle
          class="tooth-hit-area"
          cx="0"
          cy="0"
          r="18"
          (click)="onPinTooth(positioned.tooth)">
        </circle>
        <circle
          *ngIf="showRoots"
          class="tooth-node"
          cx="0"
          cy="0"
          r="18">
        </circle>
        <polygon class="tooth-core-background" [attr.points]="getOuterSquarePoints(positioned.tooth)"></polygon>

        <circle *ngIf="showRoots && hasEntireSurface(positioned.tooth)" class="surface-entire" [class.surface-preview]="isEntirePreview(positioned.tooth)" [class.surface-procedure]="isProcedureSurface(positioned.tooth, surfaceCodeEntire)" [class.surface-procedure-completed]="isCompletedProcedureSurface(positioned.tooth, surfaceCodeEntire)" [class.surface-tooth-present]="isToothPresentOverlay(positioned.tooth.id, surfaceCodeEntire)" cx="0" cy="0" r="18"></circle>
        <polygon *ngIf="!showRoots && hasEntireSurface(positioned.tooth)" class="surface-entire" [class.surface-preview]="isEntirePreview(positioned.tooth)" [class.surface-procedure]="isProcedureSurface(positioned.tooth, surfaceCodeEntire)" [class.surface-procedure-completed]="isCompletedProcedureSurface(positioned.tooth, surfaceCodeEntire)" [class.surface-tooth-present]="isToothPresentOverlay(positioned.tooth.id, surfaceCodeEntire)" [attr.points]="getOuterSquarePoints(positioned.tooth)"></polygon>

        <path *ngIf="hasRootDirectionSurface(positioned.tooth, 'top')" class="surface-root-segment" [class.surface-preview]="isRootDirectionPreview(positioned.tooth, 'top')" [class.surface-procedure]="isProcedureRootDirectionSurface(positioned.tooth, 'top')" [class.surface-procedure-completed]="isCompletedProcedureRootDirectionSurface(positioned.tooth, 'top')" [attr.d]="getRootTopPath(positioned.tooth)"></path>

        <path *ngIf="hasRootDirectionSurface(positioned.tooth, 'bottom')" class="surface-root-segment" [class.surface-preview]="isRootDirectionPreview(positioned.tooth, 'bottom')" [class.surface-procedure]="isProcedureRootDirectionSurface(positioned.tooth, 'bottom')" [class.surface-procedure-completed]="isCompletedProcedureRootDirectionSurface(positioned.tooth, 'bottom')" [attr.d]="getRootBottomPath(positioned.tooth)"></path>
        <path *ngIf="hasRootDirectionSurface(positioned.tooth, 'left')" class="surface-root-segment" [class.surface-preview]="isRootDirectionPreview(positioned.tooth, 'left')" [class.surface-procedure]="isProcedureRootDirectionSurface(positioned.tooth, 'left')" [class.surface-procedure-completed]="isCompletedProcedureRootDirectionSurface(positioned.tooth, 'left')" [attr.d]="getRootLeftPath(positioned.tooth)"></path>

        <polygon *ngIf="hasDirectionSurface(positioned.tooth, 'top')" class="surface-segment" [class.surface-preview]="isDirectionPreview(positioned.tooth, 'top')" [class.surface-procedure]="isProcedureDirectionSurface(positioned.tooth, 'top')" [class.surface-procedure-completed]="isCompletedProcedureDirectionSurface(positioned.tooth, 'top')" [attr.points]="getTopPolygonPoints(positioned.tooth)"></polygon>
        <polygon *ngIf="hasDirectionSurface(positioned.tooth, 'right')" class="surface-segment" [class.surface-preview]="isDirectionPreview(positioned.tooth, 'right')" [class.surface-procedure]="isProcedureDirectionSurface(positioned.tooth, 'right')" [class.surface-procedure-completed]="isCompletedProcedureDirectionSurface(positioned.tooth, 'right')" [attr.points]="getRightPolygonPoints(positioned.tooth)"></polygon>
        <polygon *ngIf="hasDirectionSurface(positioned.tooth, 'bottom')" class="surface-segment" [class.surface-preview]="isDirectionPreview(positioned.tooth, 'bottom')" [class.surface-procedure]="isProcedureDirectionSurface(positioned.tooth, 'bottom')" [class.surface-procedure-completed]="isCompletedProcedureDirectionSurface(positioned.tooth, 'bottom')" [attr.points]="getBottomPolygonPoints(positioned.tooth)"></polygon>
        <polygon *ngIf="hasDirectionSurface(positioned.tooth, 'left')" class="surface-segment" [class.surface-preview]="isDirectionPreview(positioned.tooth, 'left')" [class.surface-procedure]="isProcedureDirectionSurface(positioned.tooth, 'left')" [class.surface-procedure-completed]="isCompletedProcedureDirectionSurface(positioned.tooth, 'left')" [attr.points]="getLeftPolygonPoints(positioned.tooth)"></polygon>

        <polygon *ngIf="hasOcclusalSurface(positioned.tooth)" class="surface-occlusal" [class.surface-preview]="isOcclusalPreview(positioned.tooth)" [class.surface-procedure]="isProcedureSurface(positioned.tooth, surfaceCodeOcclusal)" [class.surface-procedure-completed]="isCompletedProcedureSurface(positioned.tooth, surfaceCodeOcclusal)" [attr.points]="getCenterPolygonPoints(positioned.tooth)"></polygon>

        <polygon class="tooth-outer-square" [attr.points]="getOuterSquarePoints(positioned.tooth)"></polygon>
        <polygon class="tooth-inner-square" [attr.points]="getInnerSquarePoints(positioned.tooth)"></polygon>
        <line
          class="tooth-connector"
          *ngFor="let connector of getConnectorLines(positioned.tooth)"
          [attr.x1]="connector.x1"
          [attr.y1]="connector.y1"
          [attr.x2]="connector.x2"
          [attr.y2]="connector.y2">
        </line>

        <text class="tooth-label" x="0" y="35">{{ getDisplayedNotation(positioned.tooth) }}</text>
      </g>
    </ng-container>
  </svg>

  <div
    class="tooth-tooltip"
    *ngIf="hoveredTooth"
    [style.left.px]="tooltipX"
    [style.top.px]="tooltipY">
    <div class="tooltip-number">Tooth {{ getDisplayedNotation(hoveredTooth) }}</div>
    <div class="tooltip-type">{{ hoveredTooth.type }}</div>
    <ng-container *ngIf="getToothTooltipLines(hoveredTooth.id) as tooltipLines">
      <div class="tooltip-records" *ngIf="tooltipLines.length">
        <div class="tooltip-record-line" *ngFor="let line of tooltipLines">{{ line }}</div>
      </div>
    </ng-container>
  </div>

  <div class="surface-legend" aria-label="Surface color legend">
    <span class="legend-item"><span class="legend-swatch legend-findings"></span>Findings</span>
    <span class="legend-item"><span class="legend-swatch legend-procedure-planned"></span>Planned procedures</span>
    <span class="legend-item"><span class="legend-swatch legend-procedure-completed"></span>Completed procedures</span>
  </div>
</div>

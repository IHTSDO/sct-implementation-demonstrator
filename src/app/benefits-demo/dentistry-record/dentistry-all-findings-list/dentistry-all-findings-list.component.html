<ng-container *transloco="let t; prefix: 'benefitsDemo'">
<div class="side-tab-content">
  <h3>{{ t('dentistryAllFindings.sections.title') }}</h3>
  <div *ngIf="items.length > 0; else noSavedFindings" class="saved-findings-list">
    <app-dentistry-record-item
      *ngFor="let item of items"
      [item]="item"
      [interactive]="true"
      [showDelete]="true"
      (focus)="onFocus($event)"
      (toggleStatus)="onResolve($event)"
      (delete)="onDelete($event)"
      (copyPostcoordinated)="onCopyPostcoordinated($event)">
    </app-dentistry-record-item>
  </div>
  <ng-template #noSavedFindings>
    <div class="empty-details">
      {{ t('dentistryAllFindings.messages.noRecords') }}
    </div>
  </ng-template>
</div>
</ng-container>

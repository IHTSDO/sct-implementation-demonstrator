<div class="record-content" *ngIf="patient">
  <div class="record-section">
    <div class="section-header">
      <h2>Nursing</h2>
    </div>

    <div class="tab-content" *ngIf="selectedView === 'vitals'">
      <app-nursing-vital-signs [patient]="patient"></app-nursing-vital-signs>
    </div>

    <div class="tab-content" *ngIf="selectedView === 'nutrition'">
      <app-nursing-nutritional-careplan [patient]="patient"></app-nursing-nutritional-careplan>
    </div>
  </div>
</div>
